# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — GitHub Actions
# Triggers: push to main/develop, pull requests to main
#
# Pipeline Stages:
#   1. lint      → Code quality check
#   2. test      → Run unit tests
#   3. build     → Build & push Docker image
#   4. deploy    → Deploy to server (main branch only)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-showcase-app
  PYTHON_VERSION: "3.11"

jobs:

  # ── Stage 1: Lint ────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8

      - name: Run Flake8 linter
        run: flake8 app/ --max-line-length=100 --exclude=__pycache__


  # ── Stage 2: Test ────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with pytest
        run: pytest app/tests/ -v --tb=short

      - name: Upload test results (if tests fail)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/


  # ── Stage 3: Build & Push Docker Image ──────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── Stage 4: Deploy (main branch only) ──────────────────────────────────
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Pulling latest Docker image..."
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            echo "Stopping old container..."
            docker stop devops-showcase-app || true
            docker rm devops-showcase-app || true

            echo "Starting new container..."
            docker run -d \
              --name devops-showcase-app \
              --restart unless-stopped \
              -p 5000:5000 \
              -e ENVIRONMENT=production \
              -e APP_VERSION=${{ github.sha }} \
              ${{ env.DOCKER_IMAGE }}:latest

            echo "✅ Deployment complete!"
            docker ps | grep devops-showcase-app

      - name: Health check after deploy
        run: |
          sleep 10
          curl --fail http://${{ secrets.SERVER_HOST }}:5000/health || exit 1
          echo "✅ Health check passed!"
